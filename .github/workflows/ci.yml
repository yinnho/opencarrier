name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Rust library crates (all 3 platforms) ──────────────────────────────────
  check:
    name: Check / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.os }}
      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo check --workspace

  # 只在 PR 时运行完整测试，push 到 main 时跳过（避免 GitHub Actions runner 不稳定问题）
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    if: github.event_name == 'pull_request'  # 只在 PR 时运行
    strategy:
      fail-fast: false
      matrix:
        # 移除 ubuntu，只测试 macOS 和 Windows（避免 runner 被 shutdown）
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}
      # Tests that need a display (Tauri) are skipped in headless CI via cfg
      - name: Run tests
        run: cargo test --workspace
        timeout-minutes: 15

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit

  # ── Secrets scanning (prevent accidental credential commits) ──────────────
  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan for secrets
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --only-verified \
            --exclude-paths=<(echo -e "target/\n.git/\nCargo.lock")

  # ── Installer smoke test (verify install scripts from Vercel) ──────────────
  install-smoke:
    name: Install Script Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and syntax-check shell installer
        run: |
          curl -fsSL https://opencarrier.sh/install -o /tmp/install.sh
          bash -n /tmp/install.sh
      - name: Fetch and syntax-check PowerShell installer
        run: |
          curl -fsSL https://opencarrier.sh/install.ps1 -o /tmp/install.ps1
          pwsh -NoProfile -Command "Get-Content /tmp/install.ps1 | Out-Null" 2>&1 || true
