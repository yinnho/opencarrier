                    <div><label style="color:var(--text-dim)">App ID *</label><input class="form-input" style="width:100%;font-size:12px" x-model="feishuForm.app_id" placeholder="cli_..."></div>
                    <div><label style="color:var(--text-dim)">App Secret *</label><input class="form-input" type="password" style="width:100%;font-size:12px" x-model="feishuForm.app_secret" placeholder="secret"></div>
                    <div style="grid-column:span 2"><button class="btn btn-sm" :disabled="feishuSaving" @click="feishuAddTenant()"><span x-show="!feishuSaving">Add Tenant</span><span x-show="feishuSaving">Saving...</span></button></div>
                  </div>
                </details>
              </div>
            </div>

            <!-- Agent Bindings section -->
            <div class="card mt-4" style="border-left:3px solid var(--accent)">
              <div class="card-header">Agent Bindings</div>
              <div class="card-body" style="padding-top:8px">
                <p style="font-size:12px;color:var(--text-dim);margin-bottom:12px">Bind agents to messaging channels. Each binding routes matching messages to the specified agent.</p>

                <div style="display:flex;gap:8px;margin-bottom:12px">
                  <button class="btn btn-sm" @click="showBindForm = !showBindForm; if (showBindForm && bindingsTenants.length === 0 && $store.app.isAdmin()) loadBindingsTenants()">
                    <span x-show="!showBindForm">+ Add Binding</span>
                    <span x-show="showBindForm">Cancel</span>
                  </button>
                  <button class="btn btn-sm btn-ghost" :disabled="bindingsLoading" @click="loadBindings()">Refresh</button>
                </div>

                <!-- Add binding form -->
                <div x-show="showBindForm" style="margin-bottom:14px;padding:12px;background:var(--bg);border-radius:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
                  <div>
                    <label style="color:var(--text-dim)">Agent *</label>
                    <select class="form-input" style="width:100%;font-size:12px" x-model="bindForm.agent">
                      <option value="">Select agent...</option>
                      <template x-for="a in $store.app.agents" :key="a.id">
                        <option :value="a.id" x-text="a.name + (a.tenant_id ? ' [' + a.tenant_id.slice(0,8) + ']' : '')"></option>
                      </template>
                    </select>
                  </div>
                  <div>
                    <label style="color:var(--text-dim)">Channel *</label>
                    <input class="form-input" style="width:100%;font-size:12px" x-model="bindForm.channel" placeholder="e.g. wecom, weixin, feishu">
                  </div>
                  <div>
                    <label style="color:var(--text-dim)">Account ID</label>
                    <input class="form-input" style="width:100%;font-size:12px" x-model="bindForm.account_id" placeholder="optional">
                  </div>
                  <div>
                    <label style="color:var(--text-dim)">Peer ID</label>
                    <input class="form-input" style="width:100%;font-size:12px" x-model="bindForm.peer_id" placeholder="optional">
                  </div>
                  <div>
                    <label style="color:var(--text-dim)">Guild ID</label>
                    <input class="form-input" style="width:100%;font-size:12px" x-model="bindForm.guild_id" placeholder="optional">
                  </div>
                  <div x-show="$store.app.isAdmin()">
                    <label style="color:var(--text-dim)">Tenant</label>
                    <select class="form-input" style="width:100%;font-size:12px" x-model="bindForm.tenant_id">
                      <option value="">None (global)</option>
                      <template x-for="t in bindingsTenants" :key="t.id">
                        <option :value="t.id" x-text="t.name"></option>
                      </template>
                    </select>
                  </div>
                  <div style="grid-column:span 2">
                    <button class="btn btn-sm" :disabled="bindSaving" @click="addBinding()">
                      <span x-show="!bindSaving">Save Binding</span>
                      <span x-show="bindSaving">Saving...</span>
                    </button>
                  </div>
                </div>

                <!-- Bindings list -->
                <div x-show="bindings.length > 0" style="margin-bottom:12px">
                  <table style="width:100%;font-size:12px;border-collapse:collapse">
                    <thead>
                      <tr style="border-bottom:1px solid var(--border)">
                        <th style="text-align:left;padding:4px 6px;color:var(--text-dim)">#</th>
                        <th style="text-align:left;padding:4px 6px;color:var(--text-dim)">Agent</th>
                        <th style="text-align:left;padding:4px 6px;color:var(--text-dim)">Channel</th>
                        <th style="text-align:left;padding:4px 6px;color:var(--text-dim)">Match Rule</th>
                        <th style="text-align:left;padding:4px 6px;color:var(--text-dim)">Tenant</th>
                        <th style="text-align:left;padding:4px 6px;color:var(--text-dim)"></th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="(b, i) in bindings" :key="i">
                        <tr style="border-bottom:1px solid var(--border)">
                          <td style="padding:4px 6px;font-family:monospace;font-size:11px" x-text="i"></td>
                          <td style="padding:4px 6px;font-family:monospace;font-size:11px" x-text="b.agent ? b.agent.slice(0,8)+'...' : '-'"></td>
                          <td style="padding:4px 6px"><span class="badge" style="background:var(--accent);color:#fff;font-size:10px" x-text="(b.match_rule && b.match_rule.channel) || '-'"></span></td>
                          <td style="padding:4px 6px;font-size:11px">
                            <span x-show="b.match_rule && b.match_rule.account_id" style="color:var(--text-dim)">acct:</span>
                            <span x-show="b.match_rule && b.match_rule.account_id" x-text="b.match_rule.account_id.slice(0,12)+'...'" style="font-family:monospace"></span>
                            <span x-show="b.match_rule && b.match_rule.peer_id" style="color:var(--text-dim)"> peer:</span>
                            <span x-show="b.match_rule && b.match_rule.peer_id" x-text="b.match_rule.peer_id.slice(0,12)+'...'" style="font-family:monospace"></span>
                            <span x-show="b.match_rule && b.match_rule.guild_id" style="color:var(--text-dim)"> guild:</span>
                            <span x-show="b.match_rule && b.match_rule.guild_id" x-text="b.match_rule.guild_id.slice(0,12)+'...'" style="font-family:monospace"></span>
                            <span x-show="!b.match_rule || (!b.match_rule.account_id && !b.match_rule.peer_id && !b.match_rule.guild_id)" style="color:var(--text-dim)">catch-all</span>
                          </td>
                          <td style="padding:4px 6px;font-size:11px" x-text="b.tenant_id ? b.tenant_id.slice(0,8)+'...' : '-'"></td>
                          <td style="padding:4px 6px"><button class="btn btn-sm btn-ghost" style="color:var(--error);font-size:11px" @click="removeBinding(i)">Delete</button></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
                <div x-show="!bindingsLoading && bindings.length === 0" style="font-size:12px;color:var(--text-dim);padding:4px 0">No agent bindings configured yet.</div>
                <div x-show="bindingsLoading" style="font-size:12px;color:var(--text-dim);padding:4px 0">Loading bindings...</div>
              </div>
            </div>
          </div>


          </div>
        </div>
      </div>
    </template>

    <!-- Page: Sessions -->
    <template x-if="page === 'sessions'">
      <div x-data="sessionsPage">
        <div class="page-header">
          <h2>Sessions</h2>
          <input class="form-input" style="width:200px" placeholder="Filter by agent..." x-model="searchFilter" x-show="tab === 'sessions'">
        </div>
        <div class="tabs">
          <div class="tab" :class="{ active: tab === 'sessions' }" @click="tab = 'sessions'">Sessions</div>
          <div class="tab" :class="{ active: tab === 'memory' }" @click="tab = 'memory'">Memory</div>
        </div>
        <div class="page-body" x-init="loadSessions()">
          <!-- Sessions tab -->
          <div x-show="tab === 'sessions'">
            <div x-show="loading" class="loading-state"><div class="spinner"></div><span>Loading sessions...</span></div>
            <div x-show="!loading && loadError" class="error-state">
              <span class="error-icon">!</span>
              <p x-text="loadError"></p>
              <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
            </div>
            <div x-show="!loading && !loadError">
            <div class="card mb-4" style="border-left:3px solid var(--accent)">
              <div class="font-bold" style="font-size:13px;margin-bottom:4px">Conversation Sessions</div>
              <div class="text-sm text-dim" style="line-height:1.6">
                Each conversation with an agent creates a session. Sessions store the full message history so you can resume conversations later, or review past interactions.
              </div>
            </div>
            <div class="table-wrap" x-show="filteredSessions.length">
              <table>
                <thead><tr><th>Session</th><th>Agent</th><th>Messages</th><th>Created</th><th>Actions</th></tr></thead>
                <tbody>
                  <template x-for="s in filteredSessions" :key="s.session_id">
                    <tr>
                      <td class="text-xs truncate" style="font-family:monospace;max-width:120px" x-text="s.session_id ? s.session_id.substring(0, 8) + '...' : '-'" :title="s.session_id"></td>
                      <td class="font-bold" x-text="s.agent_name || s.agent_id"></td>
                      <td x-text="s.message_count"></td>
                      <td class="text-xs" x-text="s.created_at ? new Date(s.created_at).toLocaleString() : '-'"></td>
                      <td>
                        <button class="btn btn-primary btn-sm" @click="openInChat(s)">Chat</button>
                        <button class="btn btn-danger btn-sm" @click="deleteSession(s.session_id)">Delete</button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="empty-state" x-show="!filteredSessions.length && !searchFilter">
              <div class="empty-state-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2-10 5 10 5 10-5z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
              </div>
              <h3>No sessions yet</h3>
              <p>Sessions are created when you chat with agents. Start a conversation to see session history here.</p>
              <button class="btn btn-primary" @click="location.hash='agents'">Start Chatting</button>
            </div>
            <div class="empty-state" x-show="!filteredSessions.length && searchFilter"><p>No sessions match your filter.</p></div>
            </div>
          </div>

          <!-- Memory tab -->
          <div x-show="tab === 'memory'">
            <div class="flex justify-between items-center mb-4">
              <div class="info-card" style="flex:1;margin-bottom:0">
                <h4>Agent Memory</h4>
                <p>Each agent has its own key-value memory store. Agents use memory to persist preferences, notes, and context between conversations.</p>
              </div>
              <select class="form-select" style="width:200px;margin-left:16px" x-model="memAgentId" @change="loadKv()">
                <option value="">Select agent...</option>
                <template x-for="a in $store.app.agents" :key="a.id">
                  <option :value="a.id" x-text="a.name"></option>
                </template>
              </select>
            </div>
            <div x-show="memLoading" class="loading-state"><div class="spinner"></div><span>Loading memory...</span></div>
            <div x-show="!memLoading && memLoadError" class="error-state">
              <span class="error-icon">!</span>
              <p x-text="memLoadError"></p>
              <button class="btn btn-ghost btn-sm" @click="loadKv()">Retry</button>
            </div>
            <div x-show="memAgentId && !memLoading && !memLoadError">
              <div class="flex justify-between items-center mb-4">
                <span class="text-sm text-dim" x-text="kvPairs.length + ' key(s)'"></span>
                <button class="btn btn-primary btn-sm" @click="showAdd = true">+ Add Key</button>
              </div>
              <div class="table-wrap" x-show="kvPairs.length">
                <table>
                  <thead><tr><th>Key</th><th>Value</th><th style="width:140px">Actions</th></tr></thead>
                  <tbody>
                    <template x-for="kv in kvPairs" :key="kv.key">
                      <tr>
                        <td class="font-bold" style="white-space:nowrap" x-text="kv.key"></td>
                        <td>
                          <template x-if="editingKey !== kv.key">
                            <pre style="font-size:11px;max-width:400px;overflow:auto;white-space:pre-wrap;margin:0;color:var(--text-dim)" x-text="typeof kv.value === 'object' ? JSON.stringify(kv.value, null, 2) : String(kv.value)"></pre>
                          </template>
                          <template x-if="editingKey === kv.key">
                            <div>
                              <textarea class="form-textarea" x-model="editingValue" style="font-size:11px;min-height:60px;font-family:var(--font-mono)"></textarea>
                              <div class="flex gap-2 mt-2">
                                <button class="btn btn-primary btn-sm" @click="saveEdit()">Save</button>
                                <button class="btn btn-ghost btn-sm" @click="cancelEdit()">Cancel</button>
                              </div>
                            </div>
                          </template>
                        </td>
                        <td>
                          <div class="flex gap-2">
                            <button class="btn btn-ghost btn-sm" @click="startEdit(kv)" x-show="editingKey !== kv.key">Edit</button>
                            <button class="btn btn-danger btn-sm" @click="deleteKey(kv.key)" x-show="editingKey !== kv.key">Delete</button>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
              <div class="empty-state" x-show="!kvPairs.length">
                <h4>No keys stored</h4>
                <p class="hint">This agent has no memory entries yet. Agents create memory entries automatically during conversations, or you can add them manually.</p>
                <button class="btn btn-primary mt-4" @click="showAdd = true">+ Add First Key</button>
              </div>
              <template x-if="showAdd">
                <div class="modal-overlay" @click.self="showAdd = false" @keydown.escape.window="showAdd = false">
                  <div class="modal">
                    <div class="modal-header"><h3>Add Key</h3><button class="modal-close" @click="showAdd = false">&times;</button></div>
                    <div class="form-group"><label>Key</label><input class="form-input" x-model="newKey" placeholder="my_key"></div>
                    <div class="form-group"><label>Value (JSON)</label><textarea class="form-textarea" x-model="newValue" placeholder='"hello"'></textarea></div>
                    <button class="btn btn-primary btn-block" @click="addKey()">Save</button>
                  </div>
                </div>
              </template>
            </div>
            <div class="empty-state" x-show="!memAgentId && !memLoading">
              <h4>Select an Agent</h4>
              <p class="hint">Choose an agent from the dropdown above to browse and edit its memory store.</p>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Page: Logs -->
    <template x-if="page === 'logs'">
      <div x-data="logsPage">
        <div class="page-header">
          <h2>Logs</h2>
          <div class="flex gap-2 items-center" x-show="tab === 'live'">
            <!-- Connection status indicator -->
            <span class="live-indicator" :class="connectionClass">
              <span class="live-dot"></span>
              <span x-text="connectionLabel"></span>
            </span>
            <select class="form-select" style="width:100px" x-model="levelFilter">
              <option value="">All</option>
              <option value="info">INFO</option>
              <option value="warn">WARN</option>
              <option value="error">ERROR</option>
            </select>
            <input class="form-input" style="width:180px" placeholder="Search..." x-model="textFilter">
            <button class="btn btn-ghost btn-sm" @click="togglePause()" x-text="streamPaused ? 'Resume' : 'Pause'"></button>
            <button class="btn btn-ghost btn-sm" @click="clearLogs()">Clear</button>
            <button class="btn btn-ghost btn-sm" @click="exportLogs()">Export</button>
            <div class="toggle" :class="{ active: autoRefresh }" @click="autoRefresh = !autoRefresh" title="Auto-scroll"></div>
            <span class="text-xs text-dim" x-text="autoRefresh ? 'Auto-scroll' : 'Scroll locked'"></span>
          </div>
          <div class="flex gap-2 items-center" x-show="tab === 'audit'">
            <button class="btn btn-ghost btn-sm" @click="verifyChain()">Verify Chain</button>
            <span class="badge" :class="chainValid === true ? 'badge-running' : chainValid === false ? 'badge-crashed' : ''" x-text="chainValid === true ? 'VALID' : chainValid === false ? 'BROKEN' : ''" x-show="chainValid !== null"></span>
          </div>
        </div>
        <div class="tabs">
          <div class="tab" :class="{ active: tab === 'live' }" @click="tab = 'live'">Live</div>
          <div class="tab" :class="{ active: tab === 'audit' }" @click="tab = 'audit'; if (!auditEntries.length && !auditLoading) loadAudit()">Audit Trail</div>
        </div>
        <div class="page-body" x-init="startStreaming()">
          <!-- Live logs tab -->
          <div x-show="tab === 'live'">
            <div x-show="loading" class="loading-state"><div class="spinner"></div><span>Connecting to log stream...</span></div>
            <div x-show="!loading && loadError" class="error-state">
              <span class="error-icon">!</span>
              <p x-text="loadError"></p>
              <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
            </div>
            <div x-show="!loading && !loadError">
            <div class="card" style="font-family:monospace;max-height:70vh;overflow-y:auto" id="log-container" @mouseenter="hovering = true" @mouseleave="hovering = false">
              <template x-for="entry in filteredEntries" :key="entry.seq">
                <div class="log-entry">
                  <span class="log-timestamp" x-text="new Date(entry.timestamp).toLocaleTimeString()"></span>
                  <span class="log-level" :class="'log-level-' + classifyLevel(entry.action)" x-text="classifyLevel(entry.action).toUpperCase()"></span>
                  <span class="text-xs" style="color:var(--text-dim);margin-right:6px" x-text="'[' + entry.action + ']'"></span>
                  <span class="text-xs" x-text="entry.detail"></span>
                </div>
              </template>
              <div class="empty-state" x-show="!filteredEntries.length" style="padding:20px">
                <h4>No log entries yet</h4>
                <p class="hint">Activity will appear here as agents run.</p>
              </div>
            </div>
            </div>
          </div>

          <!-- Audit trail tab -->
          <div x-show="tab === 'audit'">
            <div x-show="auditLoading" class="loading-state"><div class="spinner"></div><span>Loading audit log...</span></div>
            <div x-show="!auditLoading && auditLoadError" class="error-state">
              <span class="error-icon">!</span>
              <p x-text="auditLoadError"></p>
              <button class="btn btn-ghost btn-sm" @click="loadAudit()">Retry</button>
            </div>
            <div x-show="!auditLoading && !auditLoadError">
            <div class="card mb-4" style="border-left:3px solid var(--accent)">
              <div class="font-bold" style="font-size:13px;margin-bottom:4px">Tamper-Evident Audit Trail</div>
              <div class="text-sm text-dim" style="line-height:1.6">
                Every agent action is logged with a cryptographic hash chain. Use "Verify Chain" to confirm no entries have been altered or deleted.
              </div>
            </div>
            <div class="flex gap-2 mb-4 items-center">
              <select class="form-select" style="width:180px" x-model="filterAction">
                <option value="">All Actions</option>
                <option value="AgentSpawn">Agent Created</option>
                <option value="AgentKill">Agent Stopped</option>
                <option value="AgentMessage">Message</option>
                <option value="ToolInvoke">Tool Used</option>
                <option value="NetworkAccess">Network Access</option>
                <option value="ShellExec">Shell Command</option>
                <option value="FileAccess">File Access</option>
                <option value="MemoryAccess">Memory Access</option>
                <option value="AuthAttempt">Login Attempt</option>
              </select>
              <span class="text-sm text-dim" x-text="filteredAuditEntries.length + ' of ' + auditEntries.length + ' entries'"></span>
              <span class="text-xs text-dim" x-show="tipHash" x-text="'tip: ' + tipHash.substring(0, 16) + '...'"></span>
            </div>
            <div class="table-wrap" x-show="filteredAuditEntries.length">
              <table>
                <thead><tr><th>#</th><th>Timestamp</th><th>Agent</th><th>Action</th><th>Detail</th><th>Outcome</th></tr></thead>
                <tbody>
                  <template x-for="e in filteredAuditEntries" :key="e.seq">
                    <tr>
                      <td x-text="e.seq"></td>
                      <td class="text-xs" style="white-space:nowrap" x-text="new Date(e.timestamp).toLocaleString()"></td>
                      <td class="truncate" style="max-width:120px" x-text="auditAgentName(e.agent_id)" :title="e.agent_id"></td>
                      <td><span class="badge badge-created" x-text="friendlyAction(e.action)"></span></td>
                      <td class="truncate" style="max-width:200px" x-text="e.detail" :title="e.detail"></td>
                      <td x-text="e.outcome"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="empty-state" x-show="!auditEntries.length">
              <h4>No audit entries yet</h4>
              <p class="hint">Activity will appear here as agents operate.</p>
            </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Page: Comms -->
    <template x-if="page === 'comms'">
      <div x-data="commsPage" x-init="loadData()" @page-leave.window="stopSSE()">
        <div class="page-header">
          <h2>Agent Comms</h2>
          <div class="flex items-center gap-2">
            <button class="btn btn-primary btn-sm" @click="openSendModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
              Send Message
            </button>
            <button class="btn btn-ghost btn-sm" @click="openTaskModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
              Post Task
            </button>
            <button class="btn btn-ghost btn-sm" @click="loadData()" title="Refresh">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
            </button>
          </div>
        </div>
        <div class="page-body">
          <!-- Loading -->
          <div x-show="loading" style="animation:fadeIn 0.2s">
            <div class="card mb-4"><div class="skeleton skeleton-text" style="width:160px;margin-bottom:8px"></div><div class="skeleton skeleton-card" style="height:120px"></div></div>
            <div class="card"><div class="skeleton skeleton-text" style="width:120px;margin-bottom:8px"></div><div class="skeleton skeleton-card" style="height:200px"></div></div>
          </div>
          <!-- Error -->
          <div x-show="!loading && loadError" class="error-state" style="animation:fadeIn 0.3s">
            <h3 style="color:var(--error)">Connection Error</h3>
            <p class="text-xs text-dim" x-text="loadError"></p>
            <button class="btn btn-primary btn-sm" @click="loadData()" style="margin-top:8px">Retry</button>
          </div>
          <!-- Content -->
          <div x-show="!loading && !loadError" style="animation:fadeIn 0.3s">
            <!-- Topology -->
            <div class="card mb-4">
              <div class="card-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;margin-right:4px;vertical-align:-2px"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
                Agent Topology
                <span class="badge badge-dim" style="margin-left:8px;font-weight:400" x-text="topology.nodes.length + ' agents'"></span>
              </div>
              <div style="padding:8px 0;font-family:var(--font-mono);font-size:12px;line-height:1.8">
                <template x-if="topology.nodes.length === 0">
                  <div class="text-dim" style="text-align:center;padding:24px">No agents running</div>
                </template>
                <template x-for="root in rootNodes()" :key="root.id">
                  <div class="comms-topo-tree">
                    <div class="comms-topo-node" :title="root.id">
                      <span :class="stateBadgeClass(root.state)" style="font-size:10px;padding:1px 6px" x-text="root.state"></span>
                      <strong x-text="root.name" style="margin:0 4px"></strong>
                      <span class="text-dim" x-text="root.model"></span>
                      <template x-for="peer in peersOf(root.id)" :key="peer.id">
                        <span class="text-dim" style="margin-left:8px" x-text="'\u2194 ' + peer.name"></span>
                      </template>
                    </div>
                    <template x-for="(child, ci) in childrenOf(root.id)" :key="child.id">
                      <div class="comms-topo-child">
                        <span class="comms-topo-branch" x-text="ci < childrenOf(root.id).length - 1 ? '\u251c\u2500\u2500 ' : '\u2514\u2500\u2500 '"></span>
                        <span :class="stateBadgeClass(child.state)" style="font-size:10px;padding:1px 6px" x-text="child.state"></span>
                        <strong x-text="child.name" style="margin:0 4px"></strong>
                        <span class="text-dim" x-text="child.model"></span>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>

            <!-- Live Event Feed -->
            <div class="card">
              <div class="card-header flex justify-between items-center">
                <div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;margin-right:4px;vertical-align:-2px"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                  Live Event Feed
                </div>
                <div class="flex items-center gap-2">
                  <span class="badge badge-success" style="font-size:9px;padding:2px 6px;animation:pulse-ring 2s infinite">LIVE</span>
                  <span class="text-xs text-dim" x-text="events.length + ' events'"></span>
                </div>
              </div>
              <div style="max-height:400px;overflow-y:auto">
                <template x-if="events.length === 0">
                  <div class="text-dim" style="text-align:center;padding:24px">No inter-agent events yet</div>
                </template>
                <template x-for="ev in events" :key="ev.id">
                  <div class="comms-event-row">
                    <span class="comms-event-time text-xs text-dim" x-text="timeAgo(ev.timestamp)"></span>
                    <span :class="eventBadgeClass(ev.kind)" style="font-size:10px;padding:1px 6px;min-width:70px;text-align:center" x-text="eventLabel(ev.kind)"></span>
                    <span style="font-weight:600;font-size:12px" x-text="ev.source_name"></span>
                    <span class="text-dim" x-show="ev.target_name" x-text="'\u2192 ' + ev.target_name"></span>
                    <span class="comms-event-detail text-dim text-xs" x-text="ev.detail" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Send Message Modal -->
          <div x-show="showSendModal" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)" @click.self="showSendModal=false" x-transition>
            <div class="card" style="width:420px;max-width:90vw" @click.stop>
              <div class="card-header">Send Agent Message</div>
              <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px">
                <div>
                  <label class="text-xs text-dim" style="display:block;margin-bottom:4px">From Agent</label>
                  <select x-model="sendFrom" class="input" style="width:100%">
                    <option value="">Select agent...</option>
                    <template x-for="n in topology.nodes" :key="n.id">
                      <option :value="n.id" x-text="n.name + ' (' + n.state + ')'"></option>
                    </template>
                  </select>
                </div>
                <div>
                  <label class="text-xs text-dim" style="display:block;margin-bottom:4px">To Agent</label>
                  <select x-model="sendTo" class="input" style="width:100%">
                    <option value="">Select agent...</option>
                    <template x-for="n in topology.nodes" :key="n.id">
                      <option :value="n.id" x-text="n.name + ' (' + n.state + ')'"></option>
                    </template>
                  </select>
                </div>
                <div>
                  <label class="text-xs text-dim" style="display:block;margin-bottom:4px">Message</label>
                  <textarea x-model="sendMsg" class="input" rows="3" placeholder="Type a message..." style="width:100%;resize:vertical"></textarea>
                </div>
                <div class="flex gap-2" style="justify-content:flex-end">
                  <button class="btn btn-ghost btn-sm" @click="showSendModal=false">Cancel</button>
                  <button class="btn btn-primary btn-sm" @click="submitSend()" :disabled="sendLoading || !sendFrom || !sendTo || !sendMsg.trim()">
                    <span x-show="sendLoading">Sending...</span>
                    <span x-show="!sendLoading">Send</span>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Post Task Modal -->
          <div x-show="showTaskModal" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)" @click.self="showTaskModal=false" x-transition>
            <div class="card" style="width:420px;max-width:90vw" @click.stop>
              <div class="card-header">Post Task</div>
              <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px">
                <div>
                  <label class="text-xs text-dim" style="display:block;margin-bottom:4px">Title</label>
                  <input type="text" x-model="taskTitle" class="input" placeholder="Task title..." style="width:100%">
                </div>
                <div>
                  <label class="text-xs text-dim" style="display:block;margin-bottom:4px">Description</label>
                  <textarea x-model="taskDesc" class="input" rows="3" placeholder="Task description..." style="width:100%;resize:vertical"></textarea>
                </div>
                <div>
                  <label class="text-xs text-dim" style="display:block;margin-bottom:4px">Assign To (optional)</label>
                  <select x-model="taskAssign" class="input" style="width:100%">
                    <option value="">Unassigned</option>
                    <template x-for="n in topology.nodes" :key="n.id">
                      <option :value="n.id" x-text="n.name"></option>
                    </template>
                  </select>
                </div>
                <div class="flex gap-2" style="justify-content:flex-end">
                  <button class="btn btn-ghost btn-sm" @click="showTaskModal=false">Cancel</button>
                  <button class="btn btn-primary btn-sm" @click="submitTask()" :disabled="taskLoading || !taskTitle.trim()">
                    <span x-show="taskLoading">Posting...</span>
                    <span x-show="!taskLoading">Post Task</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>


    <!-- Page: MCP & Tools -->
    <template x-if="page === 'mcp'">
      <div x-data="mcpPage" x-init="loadData()">
        <div class="page-header">
          <h2>MCP & Tools</h2>
          <div class="flex items-center gap-2">
            <button class="btn btn-ghost btn-sm" @click="loadData()" style="padding:4px 8px" title="Refresh">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            </button>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs" style="margin-bottom:1rem">
          <button class="tab" :class="{ active: activeTab === 'servers' }" @click="activeTab = 'servers'">MCP Servers</button>
          <button class="tab" :class="{ active: activeTab === 'tools' }" @click="activeTab = 'tools'">All Tools</button>
        </div>

        <!-- Tab: MCP Servers -->
        <template x-if="activeTab === 'servers'">
          <div>
            <div x-show="mcpLoading" style="text-align:center;padding:2rem;color:var(--text-dim,#888)">Loading...</div>
            <div x-show="!mcpLoading">
              <!-- Summary cards -->
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0.75rem;margin-bottom:1.5rem">
                <div class="card" style="padding:1rem">
                  <div style="font-size:0.75rem;color:var(--text-dim,#888);margin-bottom:0.25rem">Configured</div>
                  <div style="font-size:1.5rem;font-weight:700" x-text="mcpData.total_configured || 0"></div>
                </div>
                <div class="card" style="padding:1rem">
                  <div style="font-size:0.75rem;color:var(--text-dim,#888);margin-bottom:0.25rem">Connected</div>
                  <div style="font-size:1.5rem;font-weight:700;color:var(--success,#10b981)" x-text="mcpData.total_connected || 0"></div>
                </div>
              </div>

              <!-- No servers -->
              <div x-show="(mcpData.configured || []).length === 0 && (mcpData.connected || []).length === 0" class="card" style="padding:2rem;text-align:center;color:var(--text-dim,#888)">
                <p style="margin:0 0 0.5rem">No MCP servers configured.</p>
                <p style="margin:0;font-size:0.85rem">Add servers to your <code style="background:var(--bg,#111);padding:1px 4px;border-radius:2px">config.toml</code> under <code style="background:var(--bg,#111);padding:1px 4px;border-radius:2px">[[mcp_servers]]</code>.</p>
              </div>

              <!-- Server list -->
              <div x-show="(mcpData.configured || []).length > 0 || (mcpData.connected || []).length > 0">
                <!-- Configured servers -->
                <template x-for="server in (mcpData.configured || [])" :key="server.name">
                  <div class="card" style="margin-bottom:0.75rem;padding:1rem">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
                      <div style="display:flex;align-items:center;gap:0.5rem">
                        <span style="font-weight:600" x-text="server.name"></span>
                        <span class="badge" :class="isServerConnected(server.name) ? 'badge-success' : 'badge-dim'" x-text="isServerConnected(server.name) ? 'Connected' : 'Disconnected'"></span>
                      </div>
                      <span class="badge badge-dim" x-text="transportLabel(server)"></span>
                    </div>
                    <div style="font-size:0.8rem;color:var(--text-dim,#888);font-family:monospace;margin-bottom:0.5rem" x-text="transportDetail(server)"></div>
                    <!-- Show connected tools for this server -->
                    <template x-if="isServerConnected(server.name) && connectedToolsForServer(server.name).length > 0">
                      <div style="margin-top:0.5rem">
                        <div style="font-size:0.75rem;color:var(--text-dim,#888);margin-bottom:0.25rem" x-text="connectedToolsForServer(server.name).length + ' tools'"></div>
                        <div style="display:flex;flex-wrap:wrap;gap:0.25rem">
                          <template x-for="tool in connectedToolsForServer(server.name)" :key="tool.name">
                            <span class="badge badge-created" style="font-size:0.7rem" x-text="tool.name"></span>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>

        <!-- Tab: All Tools -->
        <template x-if="activeTab === 'tools'">
          <div>
            <div x-show="toolsLoading" style="text-align:center;padding:2rem;color:var(--text-dim,#888)">Loading...</div>
            <div x-show="!toolsLoading">
              <!-- Search -->
              <div style="margin-bottom:1rem">
                <input type="text" x-model="searchQuery" placeholder="Search tools..." style="width:100%;padding:0.5rem 0.75rem;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-input,#151520);color:var(--text,#e0e0e0);font-size:0.85rem;box-sizing:border-box">
              </div>

              <!-- Summary -->
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.75rem;margin-bottom:1rem">
                <div class="card" style="padding:0.75rem">
                  <div style="font-size:0.7rem;color:var(--text-dim,#888)">Total Tools</div>
                  <div style="font-size:1.25rem;font-weight:700" x-text="toolsData.total || 0"></div>
                </div>
                <div class="card" style="padding:0.75rem">
                  <div style="font-size:0.7rem;color:var(--text-dim,#888)">Built-in</div>
                  <div style="font-size:1.25rem;font-weight:700" x-text="builtinTools.length"></div>
                </div>
                <div class="card" style="padding:0.75rem">
                  <div style="font-size:0.7rem;color:var(--text-dim,#888)">MCP</div>
                  <div style="font-size:1.25rem;font-weight:700;color:var(--accent,#7c3aed)" x-text="mcpTools.length"></div>
                </div>
              </div>

              <!-- Tool list -->
              <template x-if="mcpTools.length > 0">
                <div style="margin-bottom:1.5rem">
                  <h3 style="font-size:0.85rem;color:var(--text-dim,#888);margin:0 0 0.5rem">MCP Tools</h3>
                  <template x-for="tool in mcpTools" :key="tool.name">
                    <div class="card" style="padding:0.75rem;margin-bottom:0.5rem">
                      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem">
                        <span style="font-weight:600;font-size:0.85rem" x-text="tool.name"></span>
                        <span class="badge badge-created" style="font-size:0.65rem">MCP</span>
                      </div>
                      <div style="font-size:0.8rem;color:var(--text-dim,#888)" x-text="tool.description || 'No description'"></div>
                    </div>
                  </template>
                </div>
              </template>

              <h3 style="font-size:0.85rem;color:var(--text-dim,#888);margin:0 0 0.5rem">Built-in Tools</h3>
              <template x-for="tool in builtinTools" :key="tool.name">
                <div class="card" style="padding:0.75rem;margin-bottom:0.5rem">
                  <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem">
                    <span style="font-weight:600;font-size:0.85rem" x-text="tool.name"></span>
                    <span class="badge badge-dim" style="font-size:0.65rem" x-text="toolCategory(tool.name)"></span>
                  </div>
                  <div style="font-size:0.8rem;color:var(--text-dim,#888)" x-text="tool.description || 'No description'"></div>
                </div>
              </template>

              <!-- No tools -->
              <div x-show="filteredTools.length === 0 && !toolsLoading" class="card" style="padding:1.5rem;text-align:center;color:var(--text-dim,#888)">
                <p style="margin:0" x-text="searchQuery ? 'No tools match your search.' : 'No tools loaded.'"></p>
              </div>
            </div>
          </div>
        </template>

      </div>
    </template>

    <!-- Page: Tenants -->
    <template x-if="page === 'tenants'">
      <div x-data="tenantsPage" x-init="loadTenants()">
        <div class="page-header">
          <h2>Tenants</h2>
          <button class="btn btn-primary btn-sm" @click="showCreateModal = true" x-show="$store.app.isAdmin()">
            <span>+ Add Tenant</span>
          </button>
        </div>
        <div class="page-body">
          <div x-show="loading" class="loading-state"><div class="spinner"></div><span>Loading tenants...</span></div>
          <div x-show="!loading && loadError" class="error-state">
            <span class="error-icon">!</span>
            <p x-text="loadError"></p>
            <button class="btn btn-ghost btn-sm" @click="loadTenants()">Retry</button>
          </div>
          <div x-show="!loading && !loadError">
            <div x-show="tenants.length === 0" class="empty-state">
              <h4>No Tenants</h4>
              <p class="hint">Create a tenant to give a user their own isolated workspace.</p>
              <button class="btn btn-primary btn-sm" @click="showCreateModal = true" style="margin-top:12px">Create Tenant</button>
            </div>
            <div x-show="tenants.length > 0" class="card">
              <table style="width:100%;font-size:12px;border-collapse:collapse">
                <thead>
                  <tr style="border-bottom:1px solid var(--border)">
                    <th style="text-align:left;padding:6px 4px;font-weight:600">Name</th>
                    <th style="text-align:left;padding:6px 4px;font-weight:600">Role</th>
                    <th style="text-align:left;padding:6px 4px;font-weight:600">Status</th>
                    <th style="text-align:left;padding:6px 4px;font-weight:600">Created</th>
                    <th style="text-align:right;padding:6px 4px;font-weight:600;width:100px">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="t in tenants" :key="t.id">
                    <tr style="border-bottom:1px solid var(--border-light)">
                      <td style="padding:8px 4px">
                        <div style="font-weight:600" x-text="t.name"></div>
                        <div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono)" x-text="t.id.substring(0,12)+'...'"></div>
                      </td>
                      <td style="padding:8px 4px">
                        <span class="badge badge-secondary" style="font-size:10px;text-transform:capitalize" x-text="t.role || 'tenant'"></span>
                      </td>
                      <td style="padding:8px 4px">
                        <span class="badge" :class="t.enabled !== false ? 'badge-running' : 'badge-crashed'" style="font-size:10px" x-text="t.enabled !== false ? 'Active' : 'Disabled'"></span>
                      </td>
                      <td style="padding:8px 4px;font-size:11px;color:var(--text-dim)" x-text="formatDate(t.created_at)"></td>
                      <td style="padding:8px 4px;text-align:right">
                        <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 6px" @click="openEdit(t)" title="Edit">Edit</button>
                        <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 6px;color:var(--error)" @click="deleteTenant(t.id, t.name)" title="Delete">Del</button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Create modal -->
        <div class="modal-overlay" x-show="showCreateModal" x-transition @click.self="showCreateModal = false" @keydown.escape.window="showCreateModal = false">
          <div class="modal" style="max-width:420px">
            <div class="modal-header">
              <h3>Create Tenant</h3>
              <button class="modal-close" @click="showCreateModal = false">&times;</button>
            </div>
            <div class="form-group">
              <label>Name</label>
              <input class="form-input" x-model="createForm.name" placeholder="tenant-name" autocomplete="off">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input class="form-input" type="password" x-model="createForm.password" placeholder="Secure password..." autocomplete="off">
            </div>
            <div class="flex gap-2 justify-end" style="margin-top:16px">
              <button class="btn btn-ghost btn-sm" @click="showCreateModal = false">Cancel</button>
              <button class="btn btn-primary btn-sm" :disabled="saving || !createForm.name.trim() || !createForm.password.trim()" @click="createTenant()">
                <span x-show="!saving">Create</span>
                <span x-show="saving" class="spinner" style="width:12px;height:12px;border-width:2px"></span>
              </button>
            </div>
          </div>
        </div>

        <!-- Edit modal -->
        <div class="modal-overlay" x-show="showEditModal" x-transition @click.self="showEditModal = false" @keydown.escape.window="showEditModal = false">
          <div class="modal" style="max-width:420px">
            <div class="modal-header">
              <h3>Edit Tenant</h3>
              <button class="modal-close" @click="showEditModal = false">&times;</button>
            </div>
            <div class="form-group">
              <label>Name</label>
              <input class="form-input" x-model="editForm.name" placeholder="tenant-name" autocomplete="off">
            </div>
            <div class="form-group">
              <label>New Password <span class="text-xs text-dim">(leave blank to keep current)</span></label>
              <input class="form-input" type="password" x-model="editForm.password" placeholder="New password..." autocomplete="off">
            </div>
            <div class="form-group">
              <label class="form-checkbox" style="margin:0">
                <input type="checkbox" x-model="editForm.enabled">
                <span>Enabled</span>
              </label>
            </div>
            <div class="flex gap-2 justify-end" style="margin-top:16px">
              <button class="btn btn-ghost btn-sm" @click="showEditModal = false">Cancel</button>
              <button class="btn btn-primary btn-sm" :disabled="saving || !editForm.name.trim()" @click="updateTenant()">
                <span x-show="!saving">Save</span>
                <span x-show="saving" class="spinner" style="width:12px;height:12px;border-width:2px"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </template>

  </main>
</div>

<!-- Toast notification container -->
<div id="toast-container" class="toast-container" aria-live="polite"></div>

<!-- Temporary: re-register sw.js so the self-unregistering version replaces the old cached one -->
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){})}</script>
