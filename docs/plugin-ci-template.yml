name: Release Plugin

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: .so
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: .dylib
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: .dll
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          PLUGIN_NAME=$(grep '^name' Cargo.toml | head -1 | cut -d'"' -f2)
          ARTIFACT="target/${{ matrix.target }}/release/lib${PLUGIN_NAME}${{ matrix.artifact }}"
          mkdir -p dist
          cp "$ARTIFACT" dist/
          cp plugin.toml dist/
          cd dist && tar czf "../${PLUGIN_NAME}-${{ matrix.target }}.tar.gz" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pluginName = (Select-String -Path Cargo.toml -Pattern '^name = "(.+)"' | Select-Object -First 1).Matches[0].Groups[1].Value
          $artifact = "target/${{ matrix.target }}/release/${pluginName}${{ matrix.artifact }}"
          mkdir dist
          Copy-Item $artifact dist/
          Copy-Item plugin.toml dist/
          Compress-Archive -Path dist/* -DestinationPath "${pluginName}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
