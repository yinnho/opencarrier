[plugin]
name = "twitter"
version = "0.1.0"
abi_version = 1
description = "Twitter/X platform tools via GraphQL API"
author = "Yinnhoo"

# Configure tenants with Twitter credentials:
# [[tenants]]
# name = "default"
# [tenants.config]
# ct0 = "your_ct0_cookie_value"
# auth_token = "your_auth_token_cookie_value"

[[tools]]
name = "twitter_search"
description = "搜索 Twitter/X 推文"
parameters_json = '{"type":"object","properties":{"query":{"type":"string","description":"搜索关键词"},"filter":{"type":"string","description":"过滤模式：top(热门) 或 live(最新)","default":"top","enum":["top","live"]},"limit":{"type":"integer","description":"返回数量","default":15}},"required":["query"]}'

[[tools]]
name = "twitter_timeline"
description = "获取 Twitter/X 时间线（推荐/关注）"
parameters_json = '{"type":"object","properties":{"type":{"type":"string","description":"时间线类型：for-you(推荐) 或 following(关注)","default":"for-you","enum":["for-you","following"]},"limit":{"type":"integer","description":"返回数量","default":20}},"required":[]}'

[[tools]]
name = "twitter_tweets"
description = "获取 Twitter/X 用户推文列表"
parameters_json = '{"type":"object","properties":{"username":{"type":"string","description":"用户名（不含@）"},"limit":{"type":"integer","description":"返回数量","default":20}},"required":["username"]}'

[[tools]]
name = "twitter_profile"
description = "获取 Twitter/X 用户资料"
parameters_json = '{"type":"object","properties":{"username":{"type":"string","description":"用户名（不含@）"}},"required":["username"]}'

[[tools]]
name = "twitter_followers"
description = "获取 Twitter/X 用户粉丝列表"
parameters_json = '{"type":"object","properties":{"username":{"type":"string","description":"用户名（不含@）"},"limit":{"type":"integer","description":"返回数量","default":20}},"required":["username"]}'

[[tools]]
name = "twitter_following"
description = "获取 Twitter/X 用户关注列表"
parameters_json = '{"type":"object","properties":{"username":{"type":"string","description":"用户名（不含@）"},"limit":{"type":"integer","description":"返回数量","default":20}},"required":["username"]}'

[[tools]]
name = "twitter_thread"
description = "获取 Twitter/X 推文线程（含回复）"
parameters_json = '{"type":"object","properties":{"tweet_id":{"type":"string","description":"推文ID"}},"required":["tweet_id"]}'

[[tools]]
name = "twitter_bookmarks"
description = "获取 Twitter/X 收藏列表"
parameters_json = '{"type":"object","properties":{"limit":{"type":"integer","description":"返回数量","default":20}}}'

[[tools]]
name = "twitter_likes"
description = "获取 Twitter/X 用户点赞列表"
parameters_json = '{"type":"object","properties":{"username":{"type":"string","description":"用户名（不含@）"},"limit":{"type":"integer","description":"返回数量","default":20}},"required":["username"]}'

[[tools]]
name = "twitter_lists"
description = "获取 Twitter/X 列表"
parameters_json = '{"type":"object","properties":{}}'

[[tools]]
name = "twitter_list_tweets"
description = "获取 Twitter/X 列表中的推文"
parameters_json = '{"type":"object","properties":{"list_id":{"type":"string","description":"列表ID"},"limit":{"type":"integer","description":"返回数量","default":20}},"required":["list_id"]}'

[[tools]]
name = "twitter_notifications"
description = "获取 Twitter/X 通知"
parameters_json = '{"type":"object","properties":{"limit":{"type":"integer","description":"返回数量","default":20}}}'

[[tools]]
name = "twitter_article"
description = "获取 Twitter/X 长文（Article）内容"
parameters_json = '{"type":"object","properties":{"tweet_id":{"type":"string","description":"包含 Article 的推文ID"}},"required":["tweet_id"]}'

[[tools]]
name = "twitter_like"
description = "点赞 Twitter/X 推文"
parameters_json = '{"type":"object","properties":{"tweet_id":{"type":"string","description":"推文ID"}},"required":["tweet_id"]}'

[[tools]]
name = "twitter_unlike"
description = "取消点赞 Twitter/X 推文"
parameters_json = '{"type":"object","properties":{"tweet_id":{"type":"string","description":"推文ID"}},"required":["tweet_id"]}'

[[tools]]
name = "twitter_bookmark"
description = "收藏 Twitter/X 推文"
parameters_json = '{"type":"object","properties":{"tweet_id":{"type":"string","description":"推文ID"}},"required":["tweet_id"]}'

[[tools]]
name = "twitter_follow"
description = "关注 Twitter/X 用户"
parameters_json = '{"type":"object","properties":{"username":{"type":"string","description":"用户名（不含@）"}},"required":["username"]}'

[[tools]]
name = "twitter_unfollow"
description = "取消关注 Twitter/X 用户"
parameters_json = '{"type":"object","properties":{"username":{"type":"string","description":"用户名（不含@）"}},"required":["username"]}'

[[tools]]
name = "twitter_post"
description = "发布 Twitter/X 推文"
parameters_json = '{"type":"object","properties":{"text":{"type":"string","description":"推文内容"}},"required":["text"]}'

[[tools]]
name = "twitter_delete"
description = "删除 Twitter/X 推文"
parameters_json = '{"type":"object","properties":{"tweet_id":{"type":"string","description":"推文ID"}},"required":["tweet_id"]}'
