[plugin]
name = "wecom"
version = "1.0.0"
abi_version = 1
description = "WeChat Work (WeCom) channel and tools via MCP protocol"
author = "Yinnhoo"

[[channels]]
channel_type = "wecom_smartbot"
name = "WeChat Work"

# Channel-layer tool (direct REST API)
[[tools]]
name = "send_wecom_message"
description = "发送企业微信消息（支持企业应用和微信客服模式）"
parameters_json = '{"type":"object","properties":{"user_id":{"type":"string","description":"接收人UserID"},"content":{"type":"string","description":"消息内容"}},"required":["user_id","content"]}'

# Bot creation tools (SmartBot)
[[tools]]
name = "wecom_bot_generate"
description = "生成企业微信智能机器人创建链接（返回 scode 和 auth_url，用户扫码完成创建）"
parameters_json = '{"type":"object","properties":{},"required":[]}'

[[tools]]
name = "wecom_bot_poll"
description = "轮询企业微信智能机器人创建结果（传入 scode，返回状态和 bot_id/secret）"
parameters_json = '{"type":"object","properties":{"scode":{"type":"string","description":"wecom_bot_generate 返回的 scode"}},"required":["scode"]}'

# ---- Contact (MCP) ----
[[tools]]
name = "get_userlist"
description = "获取可见范围内通讯录成员列表"
parameters_json = '{"type":"object","properties":{},"required":[]}'

# ---- Doc (MCP) ----
[[tools]]
name = "get_doc_content"
description = "获取文档内容（普通文档/智能文档）"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string","description":"文档ID"},"url":{"type":"string","description":"文档URL"},"type":{"type":"integer","description":"内容格式：2=Markdown","default":2},"task_id":{"type":"string","description":"异步任务ID"}}}'

[[tools]]
name = "create_doc"
description = "创建文档或智能表格"
parameters_json = '{"type":"object","properties":{"doc_type":{"type":"integer","description":"3=文档, 10=智能表格"},"doc_name":{"type":"string","description":"文档名称"}},"required":["doc_type","doc_name"]}'

[[tools]]
name = "edit_doc_content"
description = "编辑文档内容（Markdown）"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"url":{"type":"string"},"content":{"type":"string","description":"Markdown内容"},"content_type":{"type":"integer","default":1}},"required":["content"]}'

[[tools]]
name = "smartpage_export_task"
description = "导出智能文档（创建异步任务）"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"url":{"type":"string"},"content_type":{"type":"integer","default":1}}}'

[[tools]]
name = "smartpage_get_export_result"
description = "获取智能文档导出结果"
parameters_json = '{"type":"object","properties":{"task_id":{"type":"string"}},"required":["task_id"]}'

[[tools]]
name = "smartsheet_get_sheet"
description = "获取智能表格子表列表"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"}},"required":["docid"]}'

[[tools]]
name = "smartsheet_add_sheet"
description = "添加智能表格子表"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"properties":{"type":"object","properties":{"title":{"type":"string"}},"required":["title"]}},"required":["docid","properties"]}'

[[tools]]
name = "smartsheet_update_sheet"
description = "更新智能表格子表"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"properties":{"type":"object","properties":{"sheet_id":{"type":"string"},"title":{"type":"string"}},"required":["sheet_id","title"]}},"required":["docid","properties"]}'

[[tools]]
name = "smartsheet_delete_sheet"
description = "删除智能表格子表"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"sheet_id":{"type":"string"}},"required":["docid","sheet_id"]}'

[[tools]]
name = "smartsheet_get_fields"
description = "获取智能表格字段定义"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"sheet_id":{"type":"string"}},"required":["docid","sheet_id"]}'

[[tools]]
name = "smartsheet_add_fields"
description = "添加智能表格字段"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"sheet_id":{"type":"string"},"fields":{"type":"array","items":{"type":"object","properties":{"field_title":{"type":"string"},"field_type":{"type":"integer"}},"required":["field_title","field_type"]}}},"required":["docid","sheet_id","fields"]}'

[[tools]]
name = "smartsheet_update_fields"
description = "更新智能表格字段"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"sheet_id":{"type":"string"},"fields":{"type":"array","items":{"type":"object","properties":{"field_id":{"type":"string"},"field_title":{"type":"string"},"field_type":{"type":"integer"}},"required":["field_id","field_title"]}}},"required":["docid","sheet_id","fields"]}'

[[tools]]
name = "smartsheet_delete_fields"
description = "删除智能表格字段"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"sheet_id":{"type":"string"},"field_ids":{"type":"array","items":{"type":"string"}}},"required":["docid","sheet_id","field_ids"]}'

[[tools]]
name = "smartsheet_get_records"
description = "获取智能表格记录"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"url":{"type":"string"},"sheet_id":{"type":"string"}},"required":["sheet_id"]}'

[[tools]]
name = "smartsheet_add_records"
description = "添加智能表格记录（最多500行）"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"sheet_id":{"type":"string"},"records":{"type":"array","items":{"type":"object","properties":{"values":{"type":"object"}},"required":["values"]}}},"required":["docid","sheet_id","records"]}'

[[tools]]
name = "smartsheet_update_records"
description = "更新智能表格记录（最多500行）"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"sheet_id":{"type":"string"},"key_type":{"type":"string"},"records":{"type":"array","items":{"type":"object","properties":{"record_id":{"type":"string"},"values":{"type":"object"}},"required":["record_id","values"]}}},"required":["docid","sheet_id","records"]}'

[[tools]]
name = "smartsheet_delete_records"
description = "删除智能表格记录"
parameters_json = '{"type":"object","properties":{"docid":{"type":"string"},"sheet_id":{"type":"string"},"record_ids":{"type":"array","items":{"type":"string"}}},"required":["docid","sheet_id","record_ids"]}'

# ---- Msg (MCP) ----
[[tools]]
name = "get_msg_chat_list"
description = "获取会话列表"
parameters_json = '{"type":"object","properties":{"begin_time":{"type":"string","description":"YYYY-MM-DD"},"end_time":{"type":"string","description":"YYYY-MM-DD"},"cursor":{"type":"string"}},"required":["begin_time","end_time"]}'

[[tools]]
name = "get_message"
description = "拉取会话消息记录"
parameters_json = '{"type":"object","properties":{"chat_type":{"type":"integer","description":"1=单聊, 2=群聊"},"chatid":{"type":"string"},"begin_time":{"type":"string"},"end_time":{"type":"string"},"cursor":{"type":"string"}},"required":["chat_type","chatid","begin_time","end_time"]}'

[[tools]]
name = "send_message"
description = "发送文本消息（MCP，单聊/群聊）"
parameters_json = '{"type":"object","properties":{"chat_type":{"type":"integer"},"chatid":{"type":"string"},"msgtype":{"type":"string","default":"text"},"text":{"type":"object","properties":{"content":{"type":"string"}},"required":["content"]}},"required":["chat_type","chatid","text"]}'

# ---- Todo (MCP) ----
[[tools]]
name = "get_todo_list"
description = "查询待办列表"
parameters_json = '{"type":"object","properties":{"create_begin_time":{"type":"string"},"create_end_time":{"type":"string"},"remind_begin_time":{"type":"string"},"remind_end_time":{"type":"string"},"limit":{"type":"integer","default":20},"cursor":{"type":"string"}}}'

[[tools]]
name = "get_todo_detail"
description = "获取待办详情"
parameters_json = '{"type":"object","properties":{"todo_id_list":{"type":"array","items":{"type":"string"}}},"required":["todo_id_list"]}'

[[tools]]
name = "create_todo"
description = "创建待办事项"
parameters_json = '{"type":"object","properties":{"content":{"type":"string"},"follower_list":{"type":"object"},"remind_time":{"type":"string"}},"required":["content"]}'

[[tools]]
name = "update_todo"
description = "更新待办事项"
parameters_json = '{"type":"object","properties":{"todo_id":{"type":"string"},"content":{"type":"string"},"follower_list":{"type":"object"},"todo_status":{"type":"integer"},"remind_time":{"type":"string"}},"required":["todo_id"]}'

[[tools]]
name = "delete_todo"
description = "删除待办事项"
parameters_json = '{"type":"object","properties":{"todo_id":{"type":"string"}},"required":["todo_id"]}'

[[tools]]
name = "change_todo_user_status"
description = "变更待办处理状态"
parameters_json = '{"type":"object","properties":{"todo_id":{"type":"string"},"user_status":{"type":"integer"}},"required":["todo_id","user_status"]}'

# ---- Meeting (MCP) ----
[[tools]]
name = "create_meeting"
description = "创建预约会议"
parameters_json = '{"type":"object","properties":{"title":{"type":"string"},"meeting_start_datetime":{"type":"string","description":"YYYY-MM-DD HH:mm"},"meeting_duration":{"type":"integer","description":"秒"},"description":{"type":"string"},"location":{"type":"string"},"invitees":{"type":"object"},"settings":{"type":"object"}},"required":["title","meeting_start_datetime","meeting_duration"]}'

[[tools]]
name = "list_user_meetings"
description = "查询会议列表"
parameters_json = '{"type":"object","properties":{"begin_datetime":{"type":"string"},"end_datetime":{"type":"string"},"cursor":{"type":"string"},"limit":{"type":"integer"}},"required":["begin_datetime","end_datetime"]}'

[[tools]]
name = "get_meeting_info"
description = "获取会议详情"
parameters_json = '{"type":"object","properties":{"meetingid":{"type":"string"},"meeting_code":{"type":"string"},"sub_meetingid":{"type":"string"}},"required":["meetingid"]}'

[[tools]]
name = "cancel_meeting"
description = "取消会议"
parameters_json = '{"type":"object","properties":{"meetingid":{"type":"string"}},"required":["meetingid"]}'

[[tools]]
name = "set_invite_meeting_members"
description = "更新会议受邀成员"
parameters_json = '{"type":"object","properties":{"meetingid":{"type":"string"},"invitees":{"type":"array","items":{"type":"object","properties":{"userid":{"type":"string"}},"required":["userid"]}}},"required":["meetingid","invitees"]}'

# ---- Schedule (MCP) ----
[[tools]]
name = "get_schedule_list_by_range"
description = "查询日程ID列表"
parameters_json = '{"type":"object","properties":{"start_time":{"type":"string"},"end_time":{"type":"string"}},"required":["start_time","end_time"]}'

[[tools]]
name = "get_schedule_detail"
description = "获取日程详情"
parameters_json = '{"type":"object","properties":{"schedule_id_list":{"type":"array","items":{"type":"string"}}},"required":["schedule_id_list"]}'

[[tools]]
name = "create_schedule"
description = "创建日程"
parameters_json = '{"type":"object","properties":{"schedule":{"type":"object","properties":{"start_time":{"type":"integer"},"end_time":{"type":"integer"},"summary":{"type":"string"},"description":{"type":"string"},"location":{"type":"string"},"is_whole_day":{"type":"integer"},"attendees":{"type":"array"},"reminders":{"type":"object"}},"required":["start_time","end_time","summary"]}},"required":["schedule"]}'

[[tools]]
name = "update_schedule"
description = "修改日程"
parameters_json = '{"type":"object","properties":{"schedule":{"type":"object","properties":{"schedule_id":{"type":"string"},"start_time":{"type":"integer"},"end_time":{"type":"integer"},"summary":{"type":"string"},"description":{"type":"string"},"location":{"type":"string"}},"required":["schedule_id"]}},"required":["schedule"]}'

[[tools]]
name = "cancel_schedule"
description = "取消日程"
parameters_json = '{"type":"object","properties":{"schedule_id":{"type":"string"}},"required":["schedule_id"]}'

[[tools]]
name = "add_schedule_attendees"
description = "添加日程参与人"
parameters_json = '{"type":"object","properties":{"schedule_id":{"type":"string"},"attendees":{"type":"array","items":{"type":"object","properties":{"userid":{"type":"string"}}}}},"required":["schedule_id","attendees"]}'

[[tools]]
name = "del_schedule_attendees"
description = "移除日程参与人"
parameters_json = '{"type":"object","properties":{"schedule_id":{"type":"string"},"attendees":{"type":"array","items":{"type":"object","properties":{"userid":{"type":"string"}}}}},"required":["schedule_id","attendees"]}'

[[tools]]
name = "check_availability"
description = "查询闲忙状态"
parameters_json = '{"type":"object","properties":{"check_user_list":{"type":"array","items":{"type":"string"}},"start_time":{"type":"integer"},"end_time":{"type":"integer"}},"required":["check_user_list","start_time","end_time"]}'
