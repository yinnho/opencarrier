[plugin]
name = "bilibili"
version = "0.1.0"
abi_version = 1
description = "Bilibili platform tools via REST API"
author = "Yinnhoo"

[[tools]]
name = "bilibili_video"
description = "获取 Bilibili 视频信息"
parameters_json = '{"type":"object","properties":{"bvid":{"type":"string","description":"视频 BV 号"}},"required":["bvid"]}'

[[tools]]
name = "bilibili_search"
description = "搜索 Bilibili 视频/用户"
parameters_json = '{"type":"object","properties":{"query":{"type":"string","description":"搜索关键词"},"type":{"type":"string","description":"搜索类型：video 或 user","default":"video","enum":["video","user"]},"limit":{"type":"integer","description":"返回数量","default":20},"page":{"type":"integer","description":"页码","default":1}},"required":["query"]}'

[[tools]]
name = "bilibili_hot"
description = "获取 Bilibili 热门视频"
parameters_json = '{"type":"object","properties":{"limit":{"type":"integer","description":"返回数量","default":20}}}'

[[tools]]
name = "bilibili_ranking"
description = "获取 Bilibili 排行榜"
parameters_json = '{"type":"object","properties":{"limit":{"type":"integer","description":"返回数量","default":20}}}'

[[tools]]
name = "bilibili_user_videos"
description = "获取 Bilibili 用户投稿视频"
parameters_json = '{"type":"object","properties":{"uid":{"type":"string","description":"用户 UID"},"limit":{"type":"integer","description":"返回数量","default":20},"page":{"type":"integer","description":"页码","default":1},"order":{"type":"string","description":"排序：pubdate/click/stow","default":"pubdate"}},"required":["uid"]}'

[[tools]]
name = "bilibili_user_info"
description = "获取 Bilibili 用户信息"
parameters_json = '{"type":"object","properties":{"uid":{"type":"string","description":"用户 UID"}},"required":["uid"]}'

[[tools]]
name = "bilibili_comments"
description = "获取 Bilibili 视频评论"
parameters_json = '{"type":"object","properties":{"bvid":{"type":"string","description":"视频 BV 号"},"limit":{"type":"integer","description":"返回数量","default":20}},"required":["bvid"]}'

[[tools]]
name = "bilibili_feed"
description = "获取 Bilibili 动态"
parameters_json = '{"type":"object","properties":{"uid":{"type":"string","description":"用户 UID（可选，不填为全部动态）"},"limit":{"type":"integer","description":"返回数量","default":15}}}'

[[tools]]
name = "bilibili_following"
description = "获取 Bilibili 关注列表"
parameters_json = '{"type":"object","properties":{"uid":{"type":"string","description":"用户 UID"},"limit":{"type":"integer","description":"返回数量","default":50},"page":{"type":"integer","description":"页码","default":1}},"required":["uid"]}'

[[tools]]
name = "bilibili_favorite"
description = "获取 Bilibili 收藏夹"
parameters_json = '{"type":"object","properties":{"limit":{"type":"integer","description":"返回数量","default":20},"page":{"type":"integer","description":"页码","default":1}}}'

[[tools]]
name = "bilibili_history"
description = "获取 Bilibili 观看历史"
parameters_json = '{"type":"object","properties":{"limit":{"type":"integer","description":"返回数量","default":20}}}'

[[tools]]
name = "bilibili_subtitle"
description = "获取 Bilibili 视频字幕"
parameters_json = '{"type":"object","properties":{"bvid":{"type":"string","description":"视频 BV 号"},"lang":{"type":"string","description":"字幕语言如 zh-CN, en-US","default":"zh-CN"}},"required":["bvid"]}'

[[tools]]
name = "bilibili_me"
description = "获取当前 Bilibili 账号信息"
parameters_json = '{"type":"object","properties":{}}'
